<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <!-- 【SEO】検索エンジン用の設定 -->
  <title>目標達成カウンター | 単純作業のモチベーション維持に</title>
  <meta name="description" content="単純作業のモチベーションを維持するための手動カウントダウン計。目標タスク数を設定し、残り数と達成率（％）をリアルタイムで可視化。効率化を支援する無料Webツール。">
 <meta name="google-site-verification" content="f7zWDRujU4r2YdVZ-eLGVaKzrOiEnZOZV02pCL7n5JQ" />
  <meta name="keywords" content="カウンター,カウントダウン,タスク管理,モチベーション,単純作業,効率化,達成率,無料ツール">
  <meta name="author" content="あなたの名前（任意）">

  <!-- 【アイコン】ブラウザのタブに表示される絵文字 -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://w3.org viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏁</text></svg>">
  
  <style>
    :root { --main-color: #4A90E2; --plus-color: #4CAF50; --minus-color: #F44336; }
    
    body { 
      font-family: 'Helvetica Neue', Arial, sans-serif; 
      text-align: center; 
      margin: 0; 
      padding: 20px; 
      background-color: #f8f9fa; 
      color: #333;
      /* 広告との重なり防止用の下部余白 */
      padding-bottom: 50px !important; 
    }

    .container { 
      max-width: 500px; 
      margin: auto; 
      background: white; 
      padding: 30px; 
      border-radius: 25px; 
      box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
    }
    
    .setting-section { margin-bottom: 20px; font-size: 14px; color: #777; }
    input { font-size: 18px; width: 80px; padding: 5px; text-align: center; border: 1px solid #ddd; border-radius: 8px; }

    #display { font-size: 120px; font-weight: bold; line-height: 1; margin: 10px 0; color: #222; }
    
    .progress-container { width: 100%; height: 20px; background: #eee; border-radius: 10px; margin: 20px 0; overflow: hidden; }
    #progress-bar { width: 0%; height: 100%; background: var(--main-color); transition: 0.3s; }
    #percent { font-weight: bold; color: var(--main-color); font-size: 20px; }

    .btn-group { 
      display: flex; 
      justify-content: center; 
      gap: 20px; 
      margin-top: 20px; 
      margin-bottom: 50px; /* 広告との安全な距離 */
    }
    
    /* 【UX】モダンで連打しやすいボタン設計 */
    button { 
      flex: 1; 
      height: 100px; 
      font-size: 80px; 
      font-weight: bold;
      cursor: pointer; 
      border: none; 
      border-radius: 15px; 
      color: white; 
      transition: 0.1s; 
      box-shadow: 0 4px 0 rgba(0,0,0,0.1); 
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      /* iPhoneのズームと選択を防止 */
      touch-action: manipulation; 
      user-select: none;
      -webkit-user-select: none;
    }
    
    /* ボタンを押したときの沈み込み演出 */
    button:active { transform: translateY(2px); box-shadow: none; }
    
    .btn-plus { background-color: var(--plus-color); }
    .btn-minus { background-color: var(--minus-color); }

    /* 【広告エリア】誤クリック防止用の余白設定 */
     /* 【真の最終解決版】数値を捨て、ブラウザの自動計算にすべて任せる */
    .ad-space { 
      margin: 30px 0 20px 0 !important; 
      padding: 0; 
      border: none; 
      width: 100%;
      display: flex; /* 要素を箱として扱う */
      justify-content: center; /* 中身を水平方向の真ん中に置く */
      align-items: center; /* 中身を垂直方向の真ん中に置く */
    }

    /* 広告タグが生成する中身を「インラインブロック」として扱い、中央寄せを有効にする */
    .ad-space * {
      margin: 0 auto !important;
      display: inline-block !important;
      max-width: 100% !important;
    }


  </style>
</head>
<body>

<div class="container">
  <div class="setting-section">
    目標タスク数：<input type="number" id="goal" value="100" min="1">
  </div>

  <div id="percent">0% 達成</div>
  <div class="progress-container">
    <div id="progress-bar"></div>
  </div>

  <div id="display">100</div>

  <div class="btn-group">
    <!-- 【配置】＋(緑)を左、−(赤/メイン操作)を右に配置し、親指での操作性を向上 -->
    <button class="btn-plus" onclick="countChange(1)">+</button>
    <button class="btn-minus" onclick="countChange(-1)">−</button>
  </div>

  <!-- ここに忍者AdMaxのコードを再度貼り付けてください -->
  <div class="ad-space">
    <!-- ここに広告タグをペースト -->
    <!-- admax -->
<script src="https://adm.shinobi.jp/o/de602bbb8caa7dcc2d573bdb0e0fccb2"></script>
<!-- admax -->
  </div>
</div>

<script>
  const goalInput = document.getElementById('goal');
  const display = document.getElementById('display');
  const progressBar = document.getElementById('progress-bar');
  const percentText = document.getElementById('percent');

  // 目標値が変わったら表示を更新
  goalInput.oninput = () => {
    display.innerText = goalInput.value;
    updateProgress();
  };

  // カウント増減の処理
  function countChange(n) {
    let current = parseInt(display.innerText);
    let nextValue = current + n;
    // 0以下にはならないように設定
    if (nextValue < 0) nextValue = 0;
    display.innerText = nextValue;
    updateProgress();
  }

  // 達成率とプログレスバーの更新
  function updateProgress() {
    const goal = parseInt(goalInput.value);
    const current = parseInt(display.innerText);
    const done = Math.max(0, goal - current);
    const percent = Math.min(100, Math.floor((done / goal) * 100));
    
    progressBar.style.width = percent + '%';
    
    if (percent === 100) {
      percentText.innerText = "🎉 目標達成！";
      percentText.style.color = "#FFD700"; // 金色
    } else {
      percentText.innerText = percent + '% 達成';
      percentText.style.color = "#4A90E2"; // 青色
    }
  }
</script>

</body>
</html>
