<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>目標達成カウンター</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://w3.org viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏁</text></svg>">
  
  <style>
    :root { --main-color: #4A90E2; --plus-color: #4CAF50; --minus-color: #F44336; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; margin: 0; padding: 20px; background-color: #f8f9fa; color: #333; padding-bottom: 50px !important;　}
    .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    
    .setting-section { margin-bottom: 20px; font-size: 14px; color: #777; }
    input { font-size: 18px; width: 80px; padding: 5px; text-align: center; border: 1px solid #ddd; border-radius: 8px; }

    #display { font-size: 120px; font-weight: bold; line-height: 1; margin: 10px 0; color: #222; }
    
    .progress-container { width: 100%; height: 20px; background: #eee; border-radius: 10px; margin: 20px 0; overflow: hidden; }
    #progress-bar { width: 0%; height: 100%; background: var(--main-color); transition: 0.3s; }
    #percent { font-weight: bold; color: var(--main-color); font-size: 20px; }

    .btn-group { display: flex; justify-content: center; gap: 20px; margin-top: 20px; margin-bottom: 50px; }
    
    button { 
      flex: 1; 
      height: 100px; 
      font-size: 80px; 
      font-weight: bold;
      cursor: pointer; 
      border: none; 
      border-radius: 15px; 
      color: white; 
      transition: 0.1s; 
      box-shadow: 0 4px 0 rgba(0,0,0,0.1); 
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      /* --- ここから追加 --- */
      touch-action: manipulation; 
      user-select: none;
      -webkit-user-select: none;
      /* --- ここまで --- */
    }
    
    button:active { transform: translateY(2px); box-shadow: none; }
    .btn-plus { background-color: var(--plus-color); }
    .btn-minus { background-color: var(--minus-color); }

    .ad-space { margin-top: 40px; padding: 10px; border: none; color: #999; font-size: 12px; }
  </style>
</head>
<body>

<div class="container">
  <div class="setting-section">
    目標タスク数：<input type="number" id="goal" value="100" min="1">
  </div>

  <div id="percent">0% 達成</div>
  <div class="progress-container">
    <div id="progress-bar"></div>
  </div>

  <div id="display">100</div>

  <div class="btn-group">
    <button class="btn-plus" onclick="countChange(1)">+</button>
    <button class="btn-minus" onclick="countChange(-1)">−</button>
  </div>

  <!-- admax -->
<script src="https://adm.shinobi.jp/s/022ae58736fde05bc65f69bf5deb5f30"></script>
<!-- admax -->
</div>

<script>
  const goalInput = document.getElementById('goal');
  const display = document.getElementById('display');
  const progressBar = document.getElementById('progress-bar');
  const percentText = document.getElementById('percent');

  goalInput.oninput = () => {
    display.innerText = goalInput.value;
    updateProgress();
  };

  function countChange(n) {
    let current = parseInt(display.innerText);
    let nextValue = current + n;
    if (nextValue < 0) nextValue = 0;
    display.innerText = nextValue;
    updateProgress();
  }

  function updateProgress() {
    const goal = parseInt(goalInput.value);
    const current = parseInt(display.innerText);
    const done = Math.max(0, goal - current);
    const percent = Math.min(100, Math.floor((done / goal) * 100));
    
    progressBar.style.width = percent + '%';
    percentText.innerText = (percent === 100) ? "🎉 目標達成！" : percent + '% 達成';
    percentText.style.color = (percent === 100) ? "#FFD700" : "#4A90E2";
  }
</script>

</body>
</html>
